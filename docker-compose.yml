# UniClub Docker Compose
# Chạy tất cả services: docker compose up -d
# Chạy riêng từng service: docker compose up -d backend
# Xem logs: docker compose logs -f
# Dừng: docker compose down

services:
  # ===================
  # Infrastructure
  # ===================
  
  mongodb:
    image: mongo:7.0.14
    container_name: uniclub-mongodb
    restart: unless-stopped
    # Security: Don't expose ports in production, use internal network
    # Uncomment for local development only
    # ports:
    #   - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: uniclub
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Security: Limit resources
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - uniclub-internal

  redis:
    image: redis:7.4-alpine3.20
    container_name: uniclub-redis
    restart: unless-stopped
    # Security: Don't expose ports in production
    # Uncomment for local development only
    # ports:
    #   - "6379:6379"
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - uniclub-internal

  # ===================
  # Application Services
  # ===================

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: uniclub-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/uniclub?authSource=admin
      REDIS_MODE: standalone
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security: Read-only filesystem where possible
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - uniclub-internal
      - uniclub-external

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
    container_name: uniclub-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - uniclub-external

  cms:
    build:
      context: .
      dockerfile: cms/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_CMS_API_BASE_URL:-http://localhost:3000/api/admin}
    container_name: uniclub-cms
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5174"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - uniclub-external

  # ===================
  # Optional: Nginx Reverse Proxy
  # ===================

  nginx:
    image: nginx:1.27-alpine3.20
    container_name: uniclub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - cms
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /var/log/nginx:uid=101,gid=101
    deploy:
      resources:
        limits:
          memory: 128M
    profiles:
      - proxy
    networks:
      - uniclub-internal
      - uniclub-external

volumes:
  mongodb_data:
  redis_data:

networks:
  uniclub-internal:
    driver: bridge
    internal: true
  uniclub-external:
    driver: bridge
